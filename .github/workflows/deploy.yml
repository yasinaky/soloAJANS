name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/ai-company-os-Q23gX
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: solo-app/package-lock.json

      - name: Install dependencies
        working-directory: solo-app
        run: npm ci

      - name: Build
        working-directory: solo-app
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./solo-app/dist
          force_orphan: true
